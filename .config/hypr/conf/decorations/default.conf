# -----------------------------------------------------
# General window decoration
# name: "Default"
# -----------------------------------------------------

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        new_optimizations = on
        ignore_opacity = true
        xray = true

        size = 6
        passes = 4
        noise = 0.05
        contrast = 1
        brightness = 1.2
    }

    shadow {
        enabled = true
        range = 60
        render_power = 3
        color = 0x55000000
    }
}
