# -----------------------------------------------------
# Window rules
# -----------------------------------------------------

windowrule = opaque, class:^(zen)$
windowrule = float, title:^(pavucontrol)$
windowrule = float, title:^(blueman-manager)$
windowrule = float, title:^(nm-connection-editor)$
windowrule = float, title:^(qalculate-gtk)$

# windowrule = workspace 2 silent, title:^(Picture-in-Picture)$

# idleinhibit
windowrule = idleinhibit fullscreen,class:([window]) # Available modes: none, always, focus, fullscreen

windowrule = workspace special:spotify, class:^(Spotify)$
windowrule = workspace special:messanger, class:^(Ferdium)$
windowrule = workspace special:social silent, class:^(discord)$
windowrule = workspace special:social silent, class:^(steam)$

# smart gaps
workspace = w[tv1]s[false], gapsout:0, gapsin:0
workspace = f[1]s[false], gapsout:0, gapsin:0
windowrule = bordersize 0, floating:0, onworkspace:w[tv1]s[false]
windowrule = rounding 0, floating:0, onworkspace:w[tv1]s[false]
windowrule = bordersize 0, floating:0, onworkspace:f[1]s[false]
windowrule = rounding 0, floating:0, onworkspace:f[1]s[false]
