# -----------------------------------------------------
# Key bindings
# name: "custom"
# -----------------------------------------------------

# SUPER KEY
$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/ml4w/scripts

# Applications
bind = $mainMod, RETURN, exec, ~/.config/ml4w/settings/terminal.sh    # Open the terminal
bind = $mainMod, B, exec, ~/.config/ml4w/settings/browser.sh          # Open the browser
bind = $mainMod, C, exec, rofi -show calc -modi calc -no-show-match -no-sort
bind = $mainMod, D, exec, pkill rofi || rofi -show drun -replace -i             # Open application launcher
bind = $mainMod, W, exec, pkill rofi || rofi -show window

# Windows
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1

bind = $mainMod CTRL, tab, togglefloating
bind = $mainMod SHIFT, tab, hy3:togglefocuslayer


# move focus
bind = $mainMod, H, hy3:movefocus, l, visible, nowarp
bind = $mainMod, J, hy3:movefocus, d, visible, nowarp
bind = $mainMod, K, hy3:movefocus, u, visible, nowarp
bind = $mainMod, L, hy3:movefocus, r, visible, nowarp


# resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, hy3:resizewindow
bind = $mainMod CTRL, L, resizeactive, 100 0                                          
bind = $mainMod CTRL, H, resizeactive, -100 0
bind = $mainMod CTRL, J, resizeactive, 0 100
bind = $mainMod CTRL, K, resizeactive, 0 -100

# move windows
bind = $mainMod SHIFT, H, hy3:movewindow, l, once
bind = $mainMod SHIFT, L, hy3:movewindow, r, once
bind = $mainMod SHIFT, K, hy3:movewindow, u, once
bind = $mainMod SHIFT, J, hy3:movewindow, d, once

bind = $mainMod, SPACE, togglesplit
bind = $mainMod SHIFT, SPACE, hy3:changegroup, opposite

binde = ALT,Tab,cyclenext
binde = ALT,Tab,bringactivetotop

# Actions
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod SHIFT, A, exec, $HYPRSCRIPTS/toggle-animations.sh
bind = $mainMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh
bind = $mainMod SHIFT, S, exec, grimblast copy area

bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh
bind = $mainMod CTRL, B, exec, ~/.config/waybar/toggle.sh
bind = $mainMod SHIFT, R, exec, $HYPRSCRIPTS/loadconfig.sh
bind = $mainMod, V, exec, $SCRIPTS/cliphist.sh

bind = $mainMod CTRL, S, exec, $HYPRSCRIPTS/hyprshade.sh
bind = $mainMod ALT, G, exec, $HYPRSCRIPTS/gamemode.sh
bind = $mainMod ALT, L, exec, ~/.config/hypr/scripts/power.sh lock

# switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, M, workspace, name:Spotify

# move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, grave, togglespecialworkspace, messanger
bind = $mainMod, S, togglespecialworkspace, spotify

bind = $mainMod, tab, movecurrentworkspacetomonitor, -1

# Fn keys
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ +5%                                        # Increase volume by 5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ -5%                                        # Reduce volume by 5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle                                                                                      # Toggle mute
bind = , XF86AudioPlay, exec, playerctl play-pause                                                                                                           # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause                                                                                                               # Audio pause
bind = , XF86AudioNext, exec, playerctl next                                                                                                                 # Audio next
bind = , XF86AudioPrev, exec, playerctl previous                                                                                                             # Audio previous
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle                                                                               # Toggle microphone

# pass bind for discord push to talk
bindi =,191, pass, class:^(discord)$

