# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------
input {
    kb_layout = pl
    kb_variant = 
    kb_model =
    numlock_by_default = true
    kb_options = fkeys:basic_13-24

    mouse_refocus = false
    follow_mouse = 1

    sensitivity = 0 # Pointer speed: -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
}
