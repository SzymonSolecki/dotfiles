# -----------------------------------------------------
# General window decoration
# name: "Default"
# -----------------------------------------------------

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        new_optimizations = on
        ignore_opacity = true
        xray = true

        size = 6
        passes = 2
        vibrancy = 0.1696
        noise = 0.02
        contrast = 1
        brightness = 1.2
    }

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = 0x66000000
    }
}
